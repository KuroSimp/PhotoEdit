<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Portfolio - Lotus Foto</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <!-- Header -->
    <div data-legacy-fragment="header"></div>

    <!-- Portfolio Section -->
    <section id="portfolio" class="portfolio-section">
        <div class="portfolio-container">
            <h2 class="portfolio-title">Our Portfolio</h2>
            <p class="portfolio-subtitle">Explore our extensive collection of real estate photography and editing work</p>
            
            <div class="portfolio-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="daytodusk">Day To Dusk</button>
                <button class="filter-btn" data-filter="hdr">HDR Blending</button>
                <button class="filter-btn" data-filter="staging">Virtual Staging</button>
                <button class="filter-btn" data-filter="renovation">Virtual Renovation</button>
                <button class="filter-btn" data-filter="removal">Item Removal</button>
            </div>
            
            <div class="portfolio-grid" id="portfolioGrid">
                <!-- Images will be loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div data-legacy-fragment="footer"></div>

    <!-- EmailJS CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="/legacy/js/main.js"></script>
    <script src="/legacy/js/portfolio.js"></script>
    
</body>
</html>
